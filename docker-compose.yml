version: "3.8"

services:
  mongodb:
    image: mongo:6
    container_name: recipe-book-db
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: recipebook

  backend:
    image: mv10001/recipe-backend:latest
    container_name: recipe-book-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/recipebook?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key

  frontend:
    image: mv10001/recipe-frontend:latest
    container_name: recipe-book-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongodb_data: