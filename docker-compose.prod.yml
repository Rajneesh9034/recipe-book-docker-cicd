version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: recipe-book-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: recipebook
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: recipe-book-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/recipebook?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: recipe-book-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data: